<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Floating Astronaut</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at bottom, #0b0f2a, #000);
      font-family: Arial, sans-serif;
    }.stars {
  position: absolute;
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
}

.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.3; }
  to { opacity: 1; }
}

.astronaut {
  position: absolute;
  width: 120px;
  animation: float 6s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-30px) rotate(5deg); }
  100% { transform: translateY(0px) rotate(0deg); }
}

.title {
  position: absolute;
  top: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 28px;
  letter-spacing: 2px;
}

  </style>
</head>
<body><div class="title">🌌 Floating Astronaut 🌌</div><div class="stars" id="stars"></div><img src="https://cdn-icons-png.flaticon.com/512/3212/3212608.png" class="astronaut" id="astro"><script>
  const starsContainer = document.getElementById('stars');

  for (let i = 0; i < 150; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.top = Math.random() * window.innerHeight + 'px';
    star.style.left = Math.random() * window.innerWidth + 'px';
    star.style.animationDuration = (Math.random() * 2 + 1) + 's';
    starsContainer.appendChild(star);
  }

  const astro = document.getElementById('astro');

  let x = window.innerWidth / 2;
  let y = window.innerHeight / 2;

  function moveAstronaut() {
    x += (Math.random() - 0.5) * 2;
    y += (Math.random() - 0.5) * 2;

    astro.style.left = x + 'px';
    astro.style.top = y + 'px';

    requestAnimationFrame(moveAstronaut);
  }

  moveAstronaut();
</script></body>
</html>
